<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pi-dyland</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262b36;
    --text: #dfe3ec;
    --muted: #8b93a7;
    --accent: #7aa2ff;
    --user: #223047;
    --tool: #1a2a1e;
    --error: #3a1f21;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif; }
  body { display: flex; flex-direction: row; }
  aside { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; }
  aside .aside-hd { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  aside .aside-hd h2 { font-size: 12px; margin: 0; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; flex: 1; }
  aside .new-thread { background: var(--accent); border: none; color: #0a0d13; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  aside .new-thread:hover { opacity: 0.85; }
  aside ul { list-style: none; margin: 0; padding: 8px; overflow-y: auto; flex: 1; }
  aside li { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  aside li:hover { background: rgba(255,255,255,0.04); }
  aside li.active { background: var(--user); }
  aside li .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  aside li .del { background: transparent; border: none; color: var(--muted); cursor: pointer; opacity: 0; padding: 0 4px; font-size: 14px; }
  aside li:hover .del { opacity: 1; }
  aside li .del:hover { color: #ffb3b8; }
  .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #sidebar-toggle { display: none; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: 0.02em; }
  header .meta { color: var(--muted); font-size: 12px; }
  header button { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  header button.reset { margin-left: auto; }
  header button:hover { color: var(--text); border-color: var(--accent); }
  main { flex: 1; overflow-y: auto; padding: 16px 20px; }
  @media (max-width: 640px) {
    aside { position: fixed; inset: 0 auto 0 0; z-index: 90; transform: translateX(-100%); transition: transform 0.2s; box-shadow: 4px 0 20px rgba(0,0,0,0.3); }
    aside.open { transform: translateX(0); }
    #sidebar-toggle { display: inline-block; }
  }
  .msg { max-width: 780px; margin: 12px auto; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); white-space: pre-wrap; word-wrap: break-word; line-height: 1.55; font-size: 14px; }
  .msg.user { background: var(--user); }
  .msg.assistant { background: var(--panel); }
  .msg.tool { background: var(--tool); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: #b5e3c4; }
  .msg.tool.card { padding: 0; overflow: hidden; white-space: normal; }
  .msg.tool.card .hd { padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; user-select: none; }
  .msg.tool.card .hd:hover { background: rgba(255,255,255,0.03); }
  .msg.tool.card .caret { width: 10px; display: inline-block; transition: transform 0.15s; opacity: 0.6; }
  .msg.tool.card.open .caret { transform: rotate(90deg); }
  .msg.tool.card .toolname { font-weight: 600; color: #d0f0d8; }
  .msg.tool.card .status { margin-left: auto; font-size: 11px; opacity: 0.6; }
  .msg.tool.card .status.err { color: #ffb3b8; opacity: 1; }
  .msg.tool.card .body { display: none; padding: 0 12px 10px 22px; border-top: 1px solid var(--border); }
  .msg.tool.card.open .body { display: block; }
  .msg.tool.card .kv { margin-top: 8px; }
  .msg.tool.card .kv .k { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
  .msg.tool.card .kv pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; color: #b5e3c4; }
  .msg.assistant.md-msg { white-space: normal; }
  .msg.assistant.md-msg p { margin: 0 0 8px; }
  .msg.assistant.md-msg p:last-child { margin-bottom: 0; }
  .msg.assistant.md-msg code { background: rgba(0,0,0,0.35); padding: 1px 5px; border-radius: 3px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
  .msg.assistant.md-msg pre { background: rgba(0,0,0,0.35); padding: 10px 12px; border-radius: 6px; overflow-x: auto; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; margin: 8px 0; }
  .msg.assistant.md-msg pre code { background: transparent; padding: 0; }
  .msg.assistant.md-msg a { color: var(--accent); }
  .msg.assistant.md-msg ul { margin: 4px 0 8px; padding-left: 22px; }
  .msg.assistant.md-msg li { margin: 2px 0; }
  .msg.assistant.md-msg strong { color: #e8ecf5; }
  .msg.thinking { background: transparent; color: var(--muted); font-style: italic; }
  .msg.error { background: var(--error); color: #ffb3b8; }
  .msg .role { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .msg .role .skill-chip { background: var(--accent); color: #0a0d13; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0; text-transform: none; }
  footer { border-top: 1px solid var(--border); padding: 12px 20px; }
  form { max-width: 780px; margin: 0 auto; display: flex; gap: 8px; }
  textarea { flex: 1; resize: none; min-height: 42px; max-height: 200px; padding: 10px 12px; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font: inherit; font-size: 14px; }
  textarea:focus { outline: none; border-color: var(--accent); }
  button.send { background: var(--accent); border: none; color: #0a0d13; padding: 0 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
  button.send:disabled { opacity: 0.5; cursor: not-allowed; }
  button.attach { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0 12px; border-radius: 8px; cursor: pointer; font-size: 18px; }
  button.attach:hover { color: var(--accent); border-color: var(--accent); }
  .attachments { max-width: 780px; margin: 0 auto 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .attachments:empty { display: none; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 8px 4px 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--muted); }
  .chip img { width: 32px; height: 32px; object-fit: cover; border-radius: 4px; }
  .chip .name { color: var(--text); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip .size { font-size: 11px; }
  .chip button { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0 2px; }
  .chip button:hover { color: #ffb3b8; }
  .drop-overlay { position: fixed; inset: 0; background: rgba(122,162,255,0.12); border: 3px dashed var(--accent); z-index: 100; display: none; align-items: center; justify-content: center; font-size: 20px; color: var(--accent); pointer-events: none; }
  .drop-overlay.active { display: flex; }
  .slash-menu { position: absolute; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); max-height: 280px; overflow-y: auto; z-index: 50; min-width: 260px; display: none; }
  .slash-menu.open { display: block; }
  .slash-item { padding: 8px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); }
  .slash-item:last-child { border-bottom: none; }
  .slash-item:hover, .slash-item.hl { background: var(--user); }
  .slash-item .n { color: var(--accent); font-weight: 600; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .slash-item .d { color: var(--muted); font-size: 11px; margin-top: 2px; white-space: normal; }
  .msg .attachments-in-msg { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .msg .attachments-in-msg img { max-width: 200px; max-height: 200px; border-radius: 6px; border: 1px solid var(--border); }
  .msg .attachments-in-msg .file-tag { padding: 4px 8px; background: rgba(0,0,0,0.25); border-radius: 4px; font-size: 12px; color: var(--muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; }
</style>
</head>
<body>
  <aside id="sidebar">
    <div class="aside-hd">
      <h2>Threads</h2>
      <button class="new-thread" id="thread-new" title="Start a new conversation">+ New</button>
    </div>
    <ul id="thread-list"></ul>
  </aside>
  <div class="main-col">
    <header>
      <button id="sidebar-toggle" title="Show threads">☰</button>
      <h1 id="thread-title">pi-dyland</h1>
      <span class="meta" id="skills-meta">loading skills…</span>
      <button class="reset" id="reset">Reset</button>
    </header>
    <main id="log"></main>
    <footer>
      <div class="attachments" id="attachments"></div>
      <form id="form">
        <input id="file-input" type="file" multiple accept="image/*,.txt,.md,.json,.csv,.log,.py,.js,.ts,.tsx,.jsx,.sh,.yaml,.yml,.toml,.xml,.html,.css,.rs,.go,.java,.c,.cpp,.h,.rb,.php,text/*" style="display:none" />
        <button type="button" class="attach" id="attach" title="Attach files or images">📎</button>
        <textarea id="prompt" placeholder="Say something to Dyland… (Ctrl+Enter to send)"></textarea>
        <button class="send" id="send" type="submit">Send</button>
      </form>
    </footer>
  </div>
  <div class="drop-overlay" id="drop-overlay">Drop files to attach</div>
  <div class="slash-menu" id="slash-menu"></div>
  <script src="/web/app.js" type="module"></script>
</body>
</html>
