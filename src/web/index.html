<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pi-dyland</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262b36;
    --text: #dfe3ec;
    --muted: #8b93a7;
    --accent: #7aa2ff;
    --user: #223047;
    --tool: #1a2a1e;
    --error: #3a1f21;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif; }
  body { display: flex; flex-direction: column; }
  header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: 0.02em; }
  header .meta { color: var(--muted); font-size: 12px; }
  header button { margin-left: auto; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  header button:hover { color: var(--text); border-color: var(--accent); }
  main { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .msg { max-width: 780px; margin: 12px auto; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); white-space: pre-wrap; word-wrap: break-word; line-height: 1.55; font-size: 14px; }
  .msg.user { background: var(--user); }
  .msg.assistant { background: var(--panel); }
  .msg.tool { background: var(--tool); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: #b5e3c4; }
  .msg.thinking { background: transparent; color: var(--muted); font-style: italic; }
  .msg.error { background: var(--error); color: #ffb3b8; }
  .msg .role { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  footer { border-top: 1px solid var(--border); padding: 12px 20px; }
  form { max-width: 780px; margin: 0 auto; display: flex; gap: 8px; }
  textarea { flex: 1; resize: none; min-height: 42px; max-height: 200px; padding: 10px 12px; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font: inherit; font-size: 14px; }
  textarea:focus { outline: none; border-color: var(--accent); }
  button.send { background: var(--accent); border: none; color: #0a0d13; padding: 0 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
  button.send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <header>
    <h1>pi-dyland</h1>
    <span class="meta" id="skills-meta">loading skills…</span>
    <button id="reset">Reset</button>
  </header>
  <main id="log"></main>
  <footer>
    <form id="form">
      <textarea id="prompt" placeholder="Say something to Dyland… (Ctrl+Enter to send)"></textarea>
      <button class="send" id="send" type="submit">Send</button>
    </form>
  </footer>
  <script src="/web/app.js" type="module"></script>
</body>
</html>
