# docker-compose.yml — deploy pi-dyland on the NAS.
#
# Usage on the NAS:
#   1. Upload this repo to /pi-dyland/ on the NAS
#   2. cp .env.example .env; edit .env with a real AICORE_TOKEN
#      For NAS-internal use, keep AICORE_BASE_URL=http://127.0.0.1:6655
#      (aicore-proxy publishes on host port 6655)
#   3. docker compose up -d --build
#
# We use network_mode: host so the container can reach the aicore-proxy
# container on 127.0.0.1:6655 without any docker-network wiring, and so the
# chat UI is served on the NAS host at http://<nas-ip>:8787/.
services:
  pi-dyland:
    build: .
    image: pi-dyland:local
    container_name: pi-dyland
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      # Mount host skills dir read-only so new skills can be added without
      # rebuilding the image.
      - ./skills:/app/skills:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
